<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Brain Atlas</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="app-shell" id="appShell">
      <aside class="rail">
        <div class="rail-group">
          <button
            class="rail-button"
            id="toggleLeftSidebarButton"
            type="button"
            title="왼쪽 탐색기 토글"
          >
            File
          </button>
          <button
            class="rail-button"
            id="openOverviewButton"
            type="button"
            title="결정 요약 열기"
          >
            Summary
          </button>
          <button
            class="rail-button"
            id="openFlowButton"
            type="button"
            title="프로세스 흐름 열기"
          >
            Flow
          </button>
          <button
            class="rail-button"
            id="openGraphButton"
            type="button"
            title="그래프 뷰 열기"
          >
            Graph
          </button>
          <button
            class="rail-button"
            id="newNoteRailButton"
            type="button"
            title="새 메모"
          >
            Note
          </button>
        </div>

        <div class="rail-group rail-group-bottom">
          <button
            class="rail-button rail-button-muted"
            id="resetWorkspaceButton"
            type="button"
            title="기본 메모 다시 불러오기"
          >
            Reset
          </button>
        </div>
      </aside>

      <div class="workspace-shell">
        <aside class="sidebar sidebar-left" id="leftSidebar">
          <div class="sidebar-top">
            <div>
              <p class="sidebar-kicker">vault</p>
              <h1 class="sidebar-title">brain</h1>
            </div>
            <div class="sidebar-actions">
              <button class="mini-button" id="openOverviewSidebarButton" type="button">
                Summary
              </button>
              <button class="mini-button" id="openFlowSidebarButton" type="button">
                Flow
              </button>
              <button class="mini-button" id="newNoteButton" type="button">
                New note
              </button>
              <button class="mini-button" id="openGraphSidebarButton" type="button">
                Graph view
              </button>
            </div>
          </div>

          <label class="sidebar-search">
            <span>Search</span>
            <input
              id="noteSearchInput"
              type="search"
              autocomplete="off"
              placeholder="메모, 개체, 관계 검색"
            />
          </label>

          <section class="vault-section">
            <div class="section-title-row">
              <span class="section-title">Notes</span>
              <span class="section-count" id="filteredNoteCount">0</span>
            </div>
            <div id="noteTree" class="note-tree"></div>
          </section>

          <section class="vault-section">
            <div class="section-title-row">
              <span class="section-title">Overview</span>
            </div>
            <div class="stat-grid">
              <article class="mini-stat">
                <span>Notes</span>
                <strong id="noteCount">0</strong>
              </article>
              <article class="mini-stat">
                <span>Entities</span>
                <strong id="entityCount">0</strong>
              </article>
              <article class="mini-stat">
                <span>Relations</span>
                <strong id="relationCount">0</strong>
              </article>
            </div>
          </section>
        </aside>

        <main class="workspace-main">
          <header class="workspace-header">
            <div class="header-group">
              <button class="header-button" id="headerLeftToggle" type="button">
                Explorer
              </button>
              <button class="header-button" id="openOverviewHeaderButton" type="button">
                Summary
              </button>
              <button class="header-button" id="openFlowHeaderButton" type="button">
                Flow
              </button>
              <button class="header-button" id="newNoteHeaderButton" type="button">
                New note
              </button>
              <button class="header-button" id="newGraphHeaderButton" type="button">
                Graph view
              </button>
            </div>
            <div class="header-group header-group-right">
              <button class="header-button" id="headerRightToggle" type="button">
                Mentions
              </button>
            </div>
          </header>

          <div class="tab-strip-wrap">
            <div class="tab-strip" id="tabStrip"></div>
            <button class="tab-add-button" id="addGraphTabButton" type="button">+</button>
          </div>

          <section class="workspace-stage" id="tabPanels"></section>

          <footer class="status-bar">
            <div class="status-item" id="statusLeft">0 backlinks</div>
            <div class="status-item status-item-center" id="statusCenter">노트 0개</div>
            <div class="status-item" id="statusRight">0 words 0 characters</div>
          </footer>
        </main>

        <aside class="sidebar sidebar-right" id="rightSidebar">
          <div class="sidebar-top sidebar-top-right">
            <div>
              <p class="sidebar-kicker">context</p>
              <h2 class="sidebar-title sidebar-title-small" id="inspectorTitle">
                Linked mentions
              </h2>
            </div>
            <button class="mini-button mini-button-muted" id="toggleRightSidebarButton" type="button">
              Hide
            </button>
          </div>

          <section class="inspector-section">
            <div class="section-title-row">
              <span class="section-title">Linked mentions</span>
              <span class="section-count" id="linkedMentionCount">0</span>
            </div>
            <div id="linkedMentionsList" class="mention-list"></div>
          </section>

          <section class="inspector-section">
            <div class="section-title-row">
              <span class="section-title">Unlinked mentions</span>
              <span class="section-count" id="unlinkedMentionCount">0</span>
            </div>
            <div id="unlinkedMentionsList" class="mention-list"></div>
          </section>

          <section class="inspector-section">
            <div class="section-title-row">
              <span class="section-title">Ontology</span>
            </div>
            <div id="ontologySummary" class="ontology-panel"></div>
          </section>
        </aside>
      </div>
    </div>

    <script src="app.js"></script>
  </body>
</html>
